<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media | Creeperflori</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <nav>
        <a href="index.html">NEWS</a>
        <a href="sozial.html">SOCIAL</a>
        <a href="fillypath.html">FILLYPATH</a>
        <a href="creepercave.html">CREEPERCAVE</a>
        <a href="admin.html" id="admin-nav-link" style="display:none; color:#ff9900;">👑 ADMIN</a>
        <a class="user-login-btn" onclick="openLoginModal()">Login</a>
    </nav>

    <div id="login-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeLoginModal()">&times;</span>
            <h2>Community Login</h2>
            <form onsubmit="event.preventDefault(); handleAuth('login');">
                <input type="email" id="auth-email" placeholder="E-Mail" required class="editor-input">
                <input type="password" id="auth-pass" placeholder="Passwort" required class="editor-input">
                <div style="text-align: right; margin-bottom: 15px;">
                    <a href="#" onclick="resetPassword()" class="forgot-link">Passwort vergessen?</a>
                </div>
                <button type="submit" class="save-btn btn-highlight">Einloggen</button>
            </form>
        </div>
    </div>

    <div class="container">
        <header class="chibi-header">
            <img src="img/Creeperflori.png" alt="Creeperflori" class="round-chibi">
            <h1>Meine Socials</h1>
        </header>

        <div class="social-wrapper">
            <a id="link-discord" target="_blank" class="social-btn btn-discord central-btn">
                <img src="img/discord_logo_white.png" alt="Discord" class="btn-icon-large">
                <span>Offizieller Discord</span>
            </a>

            <div class="social-grid">
                <a id="link-twitch" target="_blank" class="social-btn btn-twitch">🎥 Twitch</a>
                <a id="link-yt" target="_blank" class="social-btn btn-youtube">📺 YouTube</a>
                <a id="link-tt" target="_blank" class="social-btn btn-tiktok">📱 TikTok</a>
                <a id="link-insta" target="_blank" class="social-btn btn-instagram">📸 Instagram</a>
            </div>
        </div>
    </div>

    <footer class="support-footer">
        <div class="container">
            <div class="support-box">
                <h2>🆘 Support & Kontakt</h2>
                <form onsubmit="sendSupport(event)">
                    <input type="text" id="sup-name" placeholder="Dein Name" required class="editor-input">
                    <input type="text" id="sup-contact" class="guest-contact editor-input" placeholder="E-Mail / Kontakt" style="display:none;">
                    <textarea id="sup-msg" placeholder="Deine Nachricht..." rows="3" required class="editor-input"></textarea>
                    <button type="submit" class="save-btn btn-highlight">Absenden</button>
                </form>
            </div>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

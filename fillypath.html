<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fillypath Minecraft | Creeperflori</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <nav>
        <a href="index.html">NEWS</a>
        <a href="sozial.html">SOCIAL</a>
        <a href="fillypath.html">FILLYPATH</a>
        <a href="creepercave.html">CREEPERCAVE</a>
        <a href="admin.html" id="admin-nav-link" style="display:none; color:#ff9900; font-weight:bold;">👑 ADMIN</a>
        <a class="user-login-btn" onclick="openLoginModal()">Login</a>
    </nav>

    <div class="container">
        <header class="chibi-header">
            <img src="img/Creeperflori.png" alt="Creeperflori Minecraft">
            <h1 style="color: #32CD32;">Fillypath Server</h1>
            <p>IP: <span id="text-ip" style="font-weight: bold; color: white;">Lade...</span></p>
        </header>

        <h2 style="margin-bottom: 20px;">🛠️ Server-Updates & News</h2>
        <div id="fillypath-news-list">
            <p style="color: gray;">Suche nach Server-Updates...</p>
        </div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 40px 0;">

        <div class="project-card" style="max-width: 700px; margin: 0 auto; border-left-color: #32CD32;">
            <h2>🆘 Support-Anfrage</h2>
            <p style="color: #ccc; margin-bottom: 20px;">Du hast ein Problem? Wir helfen dir!</p>
            
            <form onsubmit="sendImprovedSupport(event)">
                <input type="text" id="sup-name" placeholder="Dein Name" required class="editor-input">
                
                <label style="color: #ccc; font-size: 0.9rem;">Wo liegt das Problem?</label>
                <select id="sup-category" class="editor-input" onchange="toggleSupportFields()">
                    <option value="discord">Discord (CreeperCave / DeppenCord)</option>
                    <option value="minecraft">Minecraft Server (Fillypath)</option>
                    <option value="allgemein">Allgemeine Frage</option>
                </select>

                <div id="mc-fields" style="display: none; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                    <label style="color: var(--primary); font-weight: bold; display: block; margin-bottom: 10px;">Minecraft Details:</label>
                    
                    <input type="text" id="sup-mc-name" placeholder="Dein Minecraft Name" class="editor-input">
                    
                    <label style="color: #ccc; font-size: 0.8rem;">Auf welcher Plattform spielst du?</label>
                    <select id="sup-platform" class="editor-input">
                        <option value="pc">PC / Java Edition</option>
                        <option value="handy">Smartphone (Android/iOS)</option>
                        <option value="tablet">Tablet (iPad/Android)</option>
                        <option value="laptop">Laptop (Bedrock)</option>
                        <option value="xbox">Xbox</option>
                        <option value="ps">PlayStation</option>
                        <option value="switch">Nintendo Switch</option>
                    </select>
                </div>

                <textarea id="sup-msg" placeholder="Beschreibe dein Problem so genau wie möglich..." rows="5" required class="editor-input"></textarea>
                
                <button type="submit" class="save-btn btn-highlight">Anfrage absenden</button>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        // Logik zum Einblenden der Minecraft-Felder
        function toggleSupportFields() {
            const cat = document.getElementById('sup-category').value;
            const mcFields = document.getElementById('mc-fields');
            mcFields.style.display = (cat === 'minecraft') ? 'block' : 'none';
        }
    </script>
</body>
</html>

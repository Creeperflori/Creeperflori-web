<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fillypath Minecraft | Creeperflori</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <nav>
        <a href="index.html">NEWS</a>
        <a href="sozial.html">SOCIAL</a>
        <a href="fillypath.html">FILLYPATH</a>
        <a href="creepercave.html">CREEPERCAVE</a>
        <a href="admin.html" id="admin-nav-link" style="display:none; color:#ff9900; font-weight:bold; text-shadow: 0 0 10px rgba(255,153,0,0.5);">👑 ADMIN</a>
        <a class="user-login-btn" onclick="openLoginModal()">Login</a>
    </nav>

    <div id="login-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeLoginModal()">&times;</span>
            <h2 style="margin-bottom: 20px; color: white;">Community Login</h2>
            <form onsubmit="event.preventDefault(); handleAuth('login');">
                <input type="email" id="auth-email" placeholder="E-Mail Adresse" required autocomplete="email">
                <input type="password" id="auth-pass" placeholder="Passwort" required autocomplete="current-password">
                <div class="legal-notice">
                    <input type="checkbox" id="legal-check">
                    <label for="legal-check">Ich akzeptiere die <a href="datenschutz.html" target="_blank">Datenschutzerklärung</a>.</label>
                </div>
                <button type="submit" class="save-btn">Einloggen</button>
                <button type="button" onclick="handleAuth('register')" class="save-btn btn-outline">Registrieren</button>
            </form>
        </div>
    </div>

    <div class="container">
        <header class="chibi-header">
            <img src="img/Creeperflori.png" alt="Creeperflori Minecraft">
            <h1 style="color: #32CD32;">Fillypath Server</h1>
            <p>IP: <span id="text-ip" style="font-weight: bold; color: white;">Lade...</span></p>
        </header>

        <h2 style="margin-bottom: 20px;">🛠️ Server-Updates & News</h2>
        <div id="fillypath-news-list">
            <p style="text-align: center; color: gray;">Lade Server-Updates...</p>
        </div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 50px 0;">

        <div class="project-card" style="max-width: 700px; margin: 0 auto; border-left-color: #32CD32;">
            <h2 style="margin-bottom: 10px;">🆘 Support-Anfrage</h2>
            <p style="color: #ccc; margin-bottom: 20px;">Du hast ein Problem? Wir helfen dir!</p>
            
            <form onsubmit="sendSupport(event)">
                <input type="text" id="sup-name" placeholder="Dein Name" required class="editor-input">
                
                <input type="text" id="sup-contact" class="guest-contact editor-input" placeholder="Deine E-Mail / Kontaktmöglichkeit" style="display:none; border-color: #ff9900; background: rgba(255, 153, 0, 0.1);">

                <label style="color: #ccc; font-size: 0.9rem; display: block; margin-bottom: 5px;">Wo liegt das Problem?</label>
                <select id="sup-category" class="editor-input" onchange="toggleSupportFields()">
                    <option value="allgemein">Allgemeine Frage</option>
                    <option value="discord">Discord (CreeperCave / DeppenCord)</option>
                    <option value="minecraft">Minecraft Server (Fillypath)</option>
                </select>

                <div id="discord-fields" style="display: none; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #5865F2;">
                    <label style="color: #5865F2; font-weight: bold; display: block; margin-bottom: 10px;">Discord Details:</label>
                    <input type="text" id="sup-discord-name" placeholder="Dein Discord Name (z.B. user#1234)" class="editor-input" style="margin-bottom: 0;">
                </div>

                <div id="mc-fields" style="display: none; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #32CD32;">
                    <label style="color: var(--primary); font-weight: bold; display: block; margin-bottom: 10px;">Minecraft Details:</label>
                    
                    <input type="text" id="sup-mc-name" placeholder="Dein Minecraft Name" class="editor-input">
                    
                    <label style="color: #ccc; font-size: 0.8rem; display: block; margin-bottom: 5px;">Auf welcher Plattform spielst du?</label>
                    <select id="sup-platform" class="editor-input" style="margin-bottom: 0;">
                        <option value="PC / Java">PC / Java Edition</option>
                        <option value="Handy">Smartphone (Android/iOS)</option>
                        <option value="Tablet">Tablet (iPad/Android)</option>
                        <option value="Laptop (Bedrock)">Laptop (Windows Bedrock)</option>
                        <option value="Xbox">Xbox</option>
                        <option value="PlayStation">PlayStation</option>
                        <option value="Nintendo Switch">Nintendo Switch</option>
                    </select>
                </div>

                <textarea id="sup-msg" placeholder="Beschreibe dein Problem so genau wie möglich..." rows="5" required class="editor-input"></textarea>
                
                <button type="submit" class="save-btn btn-highlight">Anfrage absenden</button>
        </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

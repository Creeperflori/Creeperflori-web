<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Creeperflori</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    
    <nav>
        <a href="index.html">NEWS</a>
        <a href="sozial.html">SOCIAL</a>
        <a href="fillypath.html">FILLYPATH</a>
        <a href="creepercave.html">CREEPERCAVE</a>
        <a href="admin.html" id="admin-nav-link" style="display:none; color:#ff9900; font-weight:bold; text-shadow: 0 0 10px rgba(255,153,0,0.5);">👑 ADMIN</a>
        <a class="user-login-btn" onclick="openLoginModal()">Login</a>
    </nav>

    <div class="container">
        <header class="chibi-header">
            <h1 style="color: #ff9900;">👑 Admin Dashboard</h1>
            <p style="color: #ccc;">Zentrale für News und Support</p>
        </header>

        <div class="admin-card" style="max-width: 800px; margin: 0 auto 40px auto; border-left-color: var(--primary); background: #111;">
            <h2 style="margin-bottom: 15px;">🚀 News Veröffentlichen</h2>
            
            <div class="editor-controls">
                <select id="n-category" class="editor-input" style="border-color: #ff9900;">
                    <option value="general">🏠 Startseite (Allgemeine News)</option>
                    <option value="fillypath">⛏️ Fillypath (Minecraft Server)</option>
                </select>

                <select id="n-type" class="editor-input">
                    <option value="news">📰 Normale News</option>
                    <option value="patchnotes">🛠️ Patchnotes</option>
                    <option value="changelog">📜 Changelog</option>
                </select>
                
                <input type="file" id="n-image" accept="image/*" class="editor-input">
            </div>
            
            <input type="text" id="n-title" placeholder="Titel des Beitrags" class="editor-input">
            <textarea id="n-content" placeholder="Was gibt's Neues?" rows="5" class="editor-input"></textarea>
            
            <div id="upload-progress" class="progress-text"></div>
            <button onclick="uploadNewsWithImage()" id="post-btn" class="save-btn btn-highlight">Veröffentlichen</button>
        </div>

        <h2 style="text-align: center; color: #ff9900; margin-bottom: 20px;">📩 Support Postfach</h2>
        <div id="admin-messages" style="max-width: 800px; margin: 0 auto;">
            <p style="text-align: center; color: gray;">Lade Nachrichten...</p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

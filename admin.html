<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Creeperflori</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <nav>
        <a href="index.html">NEWS</a>
        <a href="sozial.html">SOCIAL</a>
        <a href="fillypath.html">FILLYPATH</a>
        <a href="creepercave.html">CREEPERCAVE</a>
        <a href="admin.html" id="admin-nav-link" style="display:none; color:#ff9900;">👑 ADMIN</a>
        <a class="user-login-btn" onclick="openLoginModal()">Login</a>
    </nav>

    <div id="login-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeLoginModal()">&times;</span>
            <h2 style="margin-bottom: 20px;">Community Login</h2>
            <form onsubmit="event.preventDefault(); handleAuth('login');">
                <input type="email" id="auth-email" placeholder="E-Mail" required class="editor-input">
                <input type="password" id="auth-pass" placeholder="Passwort" required class="editor-input">
                <button type="submit" class="save-btn btn-highlight">Einloggen</button>
            </form>
        </div>
    </div>

    <div id="datenschutz-modal" class="modal-overlay">
        <div class="modal-content datenschutz-box">
            <span class="close-modal" onclick="closeDatenschutzModal()">&times;</span>
            <h2 style="color: var(--primary); margin-bottom: 15px;">Datenschutzerklärung</h2>
            <div class="legal-scroll-area"><p>Standard Datenschutztext...</p></div>
        </div>
    </div>

    <div class="container">
        <header class="chibi-header">
            <img src="img/Creeperflori.png" alt="Creeperflori" class="round-chibi">
            <h1 style="color: #ff9900;">Admin Dashboard</h1>
            <p style="color: #ccc;">Hier siehst du alle Support-Nachrichten im Detail.</p>
        </header>

        <div id="admin-messages" style="margin-top: 30px;">
            <p style="text-align:center; color:gray;">Prüfe Admin-Rechte und lade Nachrichten...</p>
        </div>
    </div>

    <footer class="support-footer">
        <div class="container">
            <div class="support-box">
                <h2>🆘 Support & Kontakt</h2>
                <form onsubmit="sendSupport(event)">
                    <input type="text" id="sup-name" placeholder="Dein Name" required class="editor-input">
                    <textarea id="sup-msg" placeholder="Deine Nachricht..." rows="3" required class="editor-input"></textarea>
                    <button type="submit" class="save-btn btn-highlight">Senden</button>
                </form>
            </div>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Creeperflori</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <nav>
        <a href="index.html">NEWS</a>
        <a href="sozial.html">SOCIAL</a>
        <a href="fillypath.html">FILLYPATH</a>
        <a href="creepercave.html">CREEPERCAVE</a>
        <a href="admin.html" id="admin-nav-link" style="display:none; color:#ff9900;">👑 ADMIN</a>
        <a class="user-login-btn" onclick="openLoginModal()">Login</a>
    </nav>

    <div id="login-modal" class="modal-overlay">...</div>
    <div id="datenschutz-modal" class="modal-overlay">...</div>

    <div class="container">
        <header class="chibi-header">
            <img src="img/Creeperflori.png" alt="Creeperflori" class="round-chibi">
            <h1 style="color:#ff9900;">Admin Dashboard</h1>
        </header>

        <div class="project-card" style="border-left-color:#00ccff; margin-bottom:50px;">
            <h2 style="color:#00ccff; margin-bottom:15px;">📰 News veröffentlichen</h2>
            <form onsubmit="event.preventDefault(); uploadNewsWithImage();">
                <input type="text" id="n-title" placeholder="Titel" required class="editor-input">
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <select id="n-category" class="editor-input" style="margin:0;">
                        <option value="general">Startseite</option>
                        <option value="fillypath">Fillypath</option>
                    </select>
                    <select id="n-type" class="editor-input" style="margin:0;">
                        <option value="news">News</option>
                        <option value="patchnotes">Patchnotes</option>
                    </select>
                </div>
                <textarea id="n-content" placeholder="Inhalt..." rows="5" required class="editor-input"></textarea>
                <input type="file" id="n-image" accept="image/*" class="editor-input">
                <button type="submit" id="post-btn" class="save-btn btn-highlight" style="background:#00ccff;">Posten</button>
            </form>
        </div>

        <h2 style="text-align:center; color:var(--primary); margin-bottom:20px;">💬 Support Tickets</h2>
        <div id="admin-messages"></div>
    </div>

   <footer class="support-footer">
        <div class="container">
            <div class="support-box">
                <h2 style="text-align: center; margin-bottom: 10px;">🆘 Support & Kontakt</h2>
                <form onsubmit="sendSupport(event)">
                    <input type="text" id="sup-name" placeholder="Dein Name" required class="editor-input">
                    <input type="text" id="sup-contact" class="guest-contact editor-input" placeholder="E-Mail oder Discord für Rückfragen" style="display:none; border-color: #ff9900;">
                    <select id="sup-category" class="editor-input" onchange="toggleSupportFields()">
                        <option value="allgemein">Allgemeine Frage</option>
                        <option value="discord">Discord Support</option>
                        <option value="minecraft">Fillypath (Minecraft)</option>
                    </select>
                    <div id="discord-fields" style="display: none; margin-bottom: 15px;">
                        <input type="text" id="sup-discord-name" placeholder="Dein Discord Name" class="editor-input" style="border-color: #5865F2;">
                    </div>
                    <div id="mc-fields" style="display: none; margin-bottom: 15px;">
                        <input type="text" id="sup-mc-name" placeholder="Minecraft Ingame Name" class="editor-input" style="border-color: #32CD32; margin-bottom: 10px;">
                        <select id="sup-platform" class="editor-input" style="border-color: #32CD32;">
                            <option value="PC / Java">PC / Java</option>
                            <option value="Handy/Tablet">Handy / Tablet</option>
                            <option value="Konsole">Konsole</option>
                        </select>
                    </div>
                    <textarea id="sup-msg" placeholder="Wie können wir helfen?" rows="4" required class="editor-input"></textarea>
                    <button type="submit" class="save-btn btn-highlight">Senden</button>
                </form>
                <p style="text-align:center; margin-top:15px; font-size:0.8rem;">
                    <a href="#" onclick="openDatenschutzModal(); return false;" style="color:#888;">Datenschutz</a>
                </p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Creeperflori. Alle Rechte vorbehalten.</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

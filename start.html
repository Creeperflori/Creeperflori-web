<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News | Creeperflori</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <nav>
        <a href="start.html">NEWS</a>
        <a href="sozial.html">SOCIAL</a>
        <a href="fillypath.html">FILLYPATH</a>
        <a href="creepercave.html">CREEPERCAVE</a>
        <a class="user-login-btn" onclick="openLoginModal()">Login</a>
    </nav>

    <div id="login-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeLoginModal()">&times;</span>
            <h2>Community Login</h2>
            
            <input type="email" id="auth-email" placeholder="E-Mail Adresse" required>
            <input type="password" id="auth-pass" placeholder="Passwort" required>
            
            <div class="legal-notice">
                <input type="checkbox" id="legal-check">
                <label for="legal-check">Ich akzeptiere die <a href="datenschutz.html" target="_blank">Datenschutzerklärung</a>.</label>
            </div>
            
            <button onclick="handleAuth('login')" class="save-btn">Einloggen</button>
            <button onclick="handleAuth('register')" class="save-btn btn-outline">Registrieren</button>
        </div>
    </div>

    <div class="container">
        <header class="chibi-header">
            <img src="img/Creeperflori.png" alt="Creeperflori Chibi">
            <h1>Creeperflori News</h1>
        </header>

        <div id="admin-panel" class="admin-card" style="display:none;">
            <h2>🛠️ Editor Hub</h2>
            <div class="editor-controls">
                <select id="n-type" class="editor-input">
                    <option value="news">📰 Allgemeine News</option>
                    <option value="patchnotes">🛠️ Patchnotes</option>
                    <option value="changelog">📜 Changelog</option>
                </select>
                <input type="file" id="n-image" accept="image/*" class="editor-input">
            </div>
            <input type="text" id="n-title" placeholder="Titel des Beitrags" class="editor-input">
            <textarea id="n-content" placeholder="Was gibt's Neues?" rows="5" class="editor-input"></textarea>
            
            <div id="upload-progress" class="progress-text"></div>
            <button onclick="uploadNewsWithImage()" id="post-btn" class="save-btn btn-highlight">Veröffentlichen</button>
        </div>

        <div id="news-list">
            <p class="loading-text">Lade News...</p>
        </div>
    </div>

    <footer class="support-footer">
        <div class="footer-content">
            <div class="footer-branding">
                <h3>💬 Creeperflori Support</h3>
                <p>Hast du Fragen oder Probleme? Schreib mir eine Nachricht!</p>
                <div class="footer-links">
                    <a href="impressum.html">Impressum</a> 
                    <a href="datenschutz.html">Datenschutz</a>
                </div>
            </div>
            <div class="footer-form-box">
                <form onsubmit="sendSupport(event)">
                    <input type="text" id="sup-name" placeholder="Dein Name" required class="editor-input">
                    <textarea id="sup-msg" placeholder="Wie kann ich helfen?" rows="3" required class="editor-input"></textarea>
                    <button type="submit" class="save-btn">Nachricht Senden</button>
                </form>
            </div>
        </div>
        <div class="footer-bottom">
            <span>&copy; 2026 Creeperflori. Alle Rechte vorbehalten.</span>
            <span>Made with ❤️ by Community</span>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

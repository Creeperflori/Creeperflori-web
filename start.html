<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News | Creeperflori</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <nav>
        <a href="index.html">NEWS</a>
        <a href="sozial.html">SOCIAL</a>
        <a href="fillypath.html">FILLYPATH</a>
        <a href="creepercave.html">CREEPERCAVE</a>
        <a href="admin.html" id="admin-nav-link" style="display:none; color:#ff9900; font-weight:bold; text-shadow: 0 0 10px rgba(255,153,0,0.5);">👑 ADMIN</a>
        <a class="user-login-btn" onclick="openLoginModal()">Login</a>
    </nav>

    <div id="login-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeLoginModal()">&times;</span>
            <h2 style="margin-bottom: 20px; color: white;">Community Login</h2>
            <form onsubmit="event.preventDefault(); handleAuth('login');">
                <input type="email" id="auth-email" placeholder="E-Mail Adresse" required autocomplete="email" class="editor-input">
                <input type="password" id="auth-pass" placeholder="Passwort" required autocomplete="current-password" class="editor-input" style="margin-bottom: 5px;">
                
                <div style="text-align: right; margin-bottom: 15px;">
                    <a href="#" onclick="resetPassword()" style="color: var(--primary); font-size: 0.85rem; text-decoration: none;">Passwort vergessen?</a>
                </div>

                <div class="legal-notice" style="margin-bottom: 15px; font-size: 0.85rem;">
                    <input type="checkbox" id="legal-check">
                    <label for="legal-check">Ich akzeptiere die <a href="datenschutz.html" target="_blank" style="color:var(--primary);">Datenschutzerklärung</a>.</label>
                </div>
                <button type="submit" class="save-btn btn-highlight" style="margin-bottom: 10px;">Einloggen</button>
                <button type="button" onclick="handleAuth('register')" class="save-btn btn-outline">Registrieren</button>
            </form>
        </div>
    </div>

    <div class="container">
        <header class="chibi-header">
            <img src="img/Creeperflori.png" alt="Creeperflori">
            <h1>Creeperflori News</h1>
        </header>

        <div id="news-list">
            <p style="text-align: center; color: gray;">Lade News...</p>
        </div>
    </div>

    <footer class="support-footer">
        <div class="footer-content">
            <div class="footer-branding">
                <h3>💬 Creeperflori Support</h3>
                <p>Hast du Fragen oder Probleme? Schreib mir hier direkt eine Nachricht!</p>
                <div class="footer-links" style="margin-top: 15px;">
                    <a href="impressum.html">Impressum</a> 
                    <a href="datenschutz.html">Datenschutz</a>
                </div>
            </div>

            <div class="footer-form-box">
                <form onsubmit="sendSupport(event)">
                    <input type="text" id="sup-name" placeholder="Dein Name" required class="editor-input">
                    <input type="text" id="sup-contact" class="guest-contact editor-input" placeholder="E-Mail / Discord für Rückfragen" style="display:none; border-color: #ff9900;">

                    <select id="sup-category" class="editor-input" onchange="toggleSupportFields()">
                        <option value="allgemein">Allgemeine Frage</option>
                        <option value="discord">Discord Support</option>
                        <option value="minecraft">Fillypath (Minecraft)</option>
                    </select>

                    <div id="discord-fields" style="display: none; margin-bottom: 15px;">
                        <input type="text" id="sup-discord-name" placeholder="Dein Discord Name" class="editor-input" style="border-color: #5865F2;">
                    </div>

                    <div id="mc-fields" style="display: none; margin-bottom: 15px;">
                        <input type="text" id="sup-mc-name" placeholder="Minecraft Ingame Name" class="editor-input" style="border-color: #32CD32; margin-bottom: 10px;">
                        <select id="sup-platform" class="editor-input" style="border-color: #32CD32; margin-bottom: 0;">
                            <option value="PC / Java">PC / Java</option>
                            <option value="Handy/Tablet">Handy / Tablet</option>
                            <option value="Konsole">Konsole (Xbox/PS/Switch)</option>
                            <option value="Laptop (Bedrock)">Laptop (Windows 10)</option>
                        </select>
                    </div>

                    <textarea id="sup-msg" placeholder="Wie kann ich dir helfen?" rows="3" required class="editor-input"></textarea>
                    <button type="submit" class="save-btn btn-highlight">Nachricht Senden</button>
                </form>
            </div>
        </div>
        <div class="footer-bottom">
            <span>&copy; 2026 Creeperflori. Alle Rechte vorbehalten.</span>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
